<!doctype html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>J-Space Visualizer — Qwen3.6-27B</title>
<style>
  :root {
    --paper-bg: #fffff6;
    --paper-texture: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.5  0 0 0 0 0.4  0 0 0 0.08 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    --surface: #fffef8;
    --surface-2: #f7f1df;
    --text: #3a3525;
    --text-2: #6b6450;
    --text-3: #9e977f;
    --border: rgba(60,50,30,0.10);
    --border-2: rgba(60,50,30,0.16);
    --accent: #b06a1a;
    --accent-soft: #f3e6cf;
    --highlight-orange: #ff8a00;
    --highlight-orange-soft: rgba(255,138,0,0.16);
    --user-bubble: #fff9ea;
    --user-bubble-text: #3a3525;
    --asst-bubble: #fff9ea;
    --asst-bubble-text: #3a3525;
    --block-bg: #f1ead4;
    --prefill: #e8e3f5;
    --prefill-border: #b8a8e0;
    --token-block: #f1ead4;
    --token-block-border: #cfc6ad;
    --gen-row: rgba(176,106,26,0.05);
    --selected: #b06a1a;
    --selected-soft: #f3e6cf;
    --frontier: #5a8a3a;
    --shadow-sm: 0 1px 2px rgba(60,50,30,0.06);
    --shadow-md: 0 4px 12px rgba(60,50,30,0.08);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --radius-lg: 24px;
    --grid-bottom-clearance: 120px;
    --chat-bottom-clearance: 120px;
    --detail-clearance-gap: 16px;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif;
    color: var(--text);
    background-color: var(--paper-bg);
    background-image: none;
    -webkit-font-smoothing: antialiased;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ===== Middle: two independently-scrollable columns ===== */
  /* #split fills the full viewport. Fixed controls sit on top; each scroll
     area gets runtime padding for the currently visible bottom stack. */
  #split { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  #grid-col {
    position: relative;
    flex: 1; min-width: 420px;
    display: flex; flex-direction: column; overflow: hidden;
    background: transparent;
  }
  #chat-col {
    width: 450px; min-width: 360px; flex-shrink: 0;
    display: flex; flex-direction: column;
    background: transparent;
    overflow: hidden;
  }

  /* ----- Chat (right column) ----- */
  #chat-log {
    flex: 1; overflow-y: auto; padding: 20px 16px var(--chat-bottom-clearance);
    scroll-padding-bottom: var(--chat-bottom-clearance);
    display: flex; flex-direction: column; gap: 14px;
  }
  .msg { display: flex; flex-direction: column; gap: 6px; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.assistant { align-self: flex-start; align-items: flex-start; }
  .msg .role { font-size: 11px; color: var(--text-3); padding: 0 4px; }
  .msg .bubble {
    padding: 10px 14px; border-radius: var(--radius-lg);
    corner-shape: squircle;
    font-size: 14px; line-height: 1.5; word-break: break-word;
    white-space: pre-wrap;
    box-shadow: none;
  }
  .msg.user .bubble { background: var(--user-bubble); color: var(--user-bubble-text); }
  .msg.assistant .bubble { background: var(--asst-bubble); color: var(--asst-bubble-text); }
  .msg .bubble .tok {
    padding: 1px 1px; border-radius: 3px; cursor: pointer;
    font-weight: 400;
    transition: background 0.12s;
  }
  .msg .bubble .tok:hover { background: rgba(0,0,0,0.08); }
  .msg .bubble .tok.selected { background: var(--highlight-orange-soft); box-shadow: 0 0 0 1px var(--highlight-orange); font-weight: 700; }
  .msg .bubble .tok.frontier { box-shadow: 0 0 0 1.5px var(--frontier); font-weight: 700; }
  .msg .bubble .placeholder { color: var(--text-3); font-style: italic; }

  /* ===== Bottom: floating message input (fixed, solid white) ===== */
  #chat-input {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 16px; z-index: 10;
    width: min(640px, 92vw);
    display: flex; flex-direction: column; gap: 8px;
    padding: 12px 16px 10px;
    background: #ffffff;
    border: 1px solid var(--border-2);
    border-radius: var(--radius-lg);
    corner-shape: squircle;
    box-shadow: 0 6px 24px rgba(60,50,30,0.14), 0 2px 6px rgba(60,50,30,0.08);
  }
  /* input row holds the textarea; Send button removed (Enter to send) */
  #chat-input-row {
    display: flex; gap: 8px; align-items: flex-end;
  }
  #chat-textarea {
    flex: 1; min-height: 44px; max-height: 120px;
    font: inherit; font-size: 14px; padding: 10px 12px;
    border: none; border-radius: 10px;
    background: transparent; color: var(--text);
    resize: none; outline: none;
    /* Prevent the browser from treating this as a password/autofill field. */
    -webkit-text-security: none;
    autocomplete: off;
  }
  /* auto-follow + resume row sits at the bottom of the box — fixed height so
     showing/hiding the resume button doesn't change the box height. */
  #auto-follow-wrap {
    display: flex; align-items: center; gap: 12px;
    padding: 0 2px;
    font-size: 12px; color: var(--text-2);
    white-space: nowrap;
    height: 22px;
  }
  #auto-follow-wrap input { margin: 0; cursor: pointer; }
  /* resume button: small, tint color, same font size as auto-follow, only when unchecked */
  #resume-btn {
    margin-left: auto;
    font-size: 12px; font-weight: 500;
    padding: 0 10px;
    border: 1px solid var(--accent); background: transparent; color: var(--accent);
    border-radius: 10px; cursor: pointer; height: 20px;
    line-height: 18px;
    display: inline-flex; align-items: center;
  }
  #resume-btn:hover { background: var(--accent-soft); }
  #resume-btn:active { transform: scale(0.97); }
  /* clear + settings buttons — fixed to the bottom-right, matching send-btn style */
  #clear-btn, #settings-btn {
    position: fixed; bottom: 16px; z-index: 10;
    height: 44px; border: 1px solid var(--border-2); border-radius: 22px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    background: #ffffff; color: var(--text);
    box-shadow: 0 6px 20px rgba(60,50,30,0.14), 0 2px 6px rgba(60,50,30,0.08);
    transition: background 0.12s, transform 0.1s;
  }
  #clear-btn { right: 16px; padding: 0 18px; justify-content: center; }
  #clear-btn:hover, #settings-btn:hover { background: var(--surface); }
  #settings-btn {
    left: 16px; width: 44px; padding: 0;
    border-radius: 50%; justify-content: center;
  }
  #clear-btn:active, #settings-btn:active { transform: scale(0.97); }
  #clear-btn:disabled { background: var(--text-3); cursor: not-allowed; }

  /* settings modal (centered, with dimming backdrop) */
  #settings-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.28);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    display: none;
    align-items: center; justify-content: center;
  }
  #settings-backdrop.visible { display: flex; }
  #settings-popup {
    width: min(380px, 92vw);
    background: rgba(253,246,227,0.96);
    border: 1px solid var(--border-2); border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    padding: 18px 20px;
  }
  #settings-popup h3 {
    margin: 0 0 14px; font-size: 14px; font-weight: 600; color: var(--text);
  }
  #settings-popup .field { margin-bottom: 14px; }
  #settings-popup .field label {
    display: block; font-size: 12px; color: var(--text-2); margin-bottom: 4px;
  }
  #settings-popup .field input {
    width: 100%; font: inherit; font-size: 13px; padding: 6px 10px;
    border: 1px solid var(--border-2); border-radius: var(--radius-xs);
    background: var(--surface); color: var(--text); outline: none;
  }
  #settings-popup .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  #settings-popup .field .hint { font-size: 11px; color: var(--text-3); margin-top: 3px; }
  #settings-popup .actions {
    display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px;
  }
  #settings-popup .actions button {
    min-width: 72px; padding: 6px 16px; border-radius: var(--radius-xs);
    font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-2);
    background: var(--surface); color: var(--text);
    transition: background 0.12s;
  }
  #settings-popup .actions button.ok { background: var(--accent); color: white; border-color: var(--accent); }
  #settings-popup .actions button.ok:hover { background: #94560f; }
  #settings-popup .actions button.cancel:hover { background: var(--border); }

  /* ----- Grid (J-lens output): rows=positions, columns=layers, label on right ----- */
  /* No top padding so the sticky layer-header aligns with the very top of the
     grid column. Bottom padding is updated from the actual fixed overlays. */
  #grid-body {
    flex: 1; overflow: auto;
    padding: 0 0 var(--grid-bottom-clearance) 8px;
    scroll-padding-bottom: var(--grid-bottom-clearance);
    background: transparent;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  #grid-body::-webkit-scrollbar { display: none; }
  html.recovering-clearance #chat-log,
  html.recovering-clearance #grid-body {
    transition: padding-bottom 220ms ease;
  }
  #grid { border-collapse: separate; border-spacing: 2px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; }
  #grid th, #grid td { padding: 8px 6px; white-space: nowrap; }
  /* Top header: layer labels (sticky top, aligned to the very top) */
  #grid th {
    background: var(--paper-bg); color: var(--text-2); font-weight: 600;
    position: sticky; top: 0; z-index: 2;
    border-bottom: none;
    min-width: 52px; text-align: center;
    height: 32px;
  }
  /* Right header: position label column header (sticky right + sticky top corner) */
  #grid th.pos-header {
    position: sticky; right: 0; top: 0; z-index: 4;
    min-width: 140px; text-align: right;
    border-left: none;
    background: var(--paper-bg);
  }
  /* Right body cells: position label (sticky right) — token text + ordinal right-aligned */
  #grid td.pos-label {
    font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 400;
    color: var(--text); background: var(--paper-bg);
    position: sticky; right: 0; z-index: 1;
    border-left: none;
    text-align: right; padding: 4px 12px;
    min-width: 140px; max-width: 200px; overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap;
  }
  #grid td.pos-label .tok-text { color: var(--text); }
  #grid td.pos-label.clickable-token { cursor: pointer; }
  #grid td.pos-label.clickable-token:hover .tok-text {
    color: var(--highlight-orange);
    text-decoration: underline;
    text-decoration-thickness: 1.5px;
    text-underline-offset: 4px;
  }
  #grid td.pos-label.gen .tok-text { color: var(--accent); font-weight: 600; }
  #grid td.pos-label.selected-token .tok-text {
    color: var(--highlight-orange);
    font-weight: 700;
    text-decoration: underline;
    text-decoration-thickness: 2px;
    text-underline-offset: 4px;
  }
  #grid td.pos-label.gen { }
  /* Data cells (layer × position) — show only token text, no ID. Taller cells
     with a thin white gap between them (via border-spacing on the table). */
  #grid td.cell {
    border-radius: 6px; text-align: center;
    color: var(--text); background: transparent;
    transition: box-shadow 0.12s, color 0.12s, filter 0.12s;
    min-width: 52px; height: 36px;
  }
  #grid td.cell .word { display: block; font-weight: 400; }
  #grid td.cell.selectable { cursor: pointer; }
  #grid td.cell.selectable:hover { filter: saturate(1.2) brightness(0.98); }
  #grid td.cell.selected { box-shadow: inset 0 0 0 2px var(--highlight-orange), 0 0 0 1px rgba(255,138,0,0.18); }
  #grid td.cell.selected .word { color: var(--highlight-orange); font-weight: 700; }
  #grid td.cell.matching-token { box-shadow: inset 0 0 0 1.5px rgba(255,138,0,0.42), 0 0 0 1px rgba(255,138,0,0.10); }
  #grid td.cell.matching-token .word { color: var(--highlight-orange); font-weight: 700; }
  #grid td.cell.selected-row { }
  #grid td.cell.gen-row { }
  #grid td.cell.gen-row.selected-row { }

  /* ----- Detail panel (floating, centered, stacked above the input box) ----- */
  /* Width matches the input box. Sits just above it. */
  #detail {
    position: fixed;
    left: 50%; bottom: 120px;
    transform: translateX(-50%) translateY(0);
    width: min(640px, 92vw);
    background: #ffffff;
    border: 1px solid var(--border-2);
    border-radius: var(--radius-lg);
    corner-shape: squircle;
    box-shadow: 0 6px 24px rgba(60,50,30,0.14), 0 2px 6px rgba(60,50,30,0.08);
    padding: 14px 18px;
    max-height: 40vh; overflow-y: auto;
    z-index: 9;
    display: none;
    opacity: 0;
    transition: opacity 180ms ease, transform 180ms ease;
  }
  #detail.visible {
    display: block;
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    animation: detail-enter 180ms ease both;
  }
  #detail.closing {
    display: block;
    pointer-events: none;
    animation: detail-exit 180ms ease both;
  }
  @keyframes detail-enter {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes detail-exit {
    from { opacity: 1; transform: translateX(-50%) translateY(0); }
    to { opacity: 0; transform: translateX(-50%) translateY(10px); }
  }
  #detail h3 { margin: 0 0 8px; font-size: 12px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.04em; }
  #detail .empty { color: var(--text-3); font-size: 13px; padding: 8px 0; }
  #detail .ctx { font-size: 12px; color: var(--text-2); margin-bottom: 10px; }
  #detail .ctx b { color: var(--highlight-orange); font-family: ui-monospace, Menlo, monospace; }
  #detail .readout { display: flex; flex-direction: column; gap: 4px; }
  #detail .readout .row { display: flex; align-items: center; gap: 8px; font-family: ui-monospace, Menlo, monospace; font-size: 12px; }
  #detail .readout .row .idx { color: var(--text-3); width: 18px; text-align: right; flex-shrink: 0; }
  #detail .readout .row .tok { font-weight: 500; width: 100px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; }
  #detail .readout .row .id { color: var(--text-3); font-size: 11px; width: 60px; flex-shrink: 0; }
  /* Fixed-width bar pushed to the right edge of the card. */
  #detail .readout .row .bar { width: 180px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; flex-shrink: 0; margin-left: auto; }
  #detail .readout .row .bar > div { height: 100%; background: var(--highlight-orange); border-radius: 3px; }
  #detail .readout .row.top1 .tok { color: var(--highlight-orange); font-weight: 600; }
  #detail .readout .row.top1 .bar > div { background: var(--highlight-orange); }
  #detail .close {
    position: absolute; top: 8px; right: 10px;
    border: none; background: transparent; color: var(--text-3);
    font-size: 18px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px;
  }
  #detail .close:hover { color: var(--text); background: var(--border); }

  .status { color: var(--text-3); font-size: 13px; }
  .loading { color: var(--accent); }
  .empty-state { color: var(--text-3); font-size: 13px; padding: 24px; text-align: center; }
</style>
</head><body>
<div id="app">
  <!-- ===== MIDDLE: two independently-scrollable columns ===== -->
  <div id="split">
    <!-- ===== LEFT: J-lens grid ===== -->
    <div id="grid-col">
      <div id="grid-body"></div>
      <div id="detail"></div>
    </div>

    <!-- ===== RIGHT: chat ===== -->
    <div id="chat-col">
      <div id="chat-log"></div>
    </div>
  </div>

  <!-- ===== BOTTOM: floating message input (fixed, solid white) ===== -->
  <div id="chat-input">
    <div id="chat-input-row">
      <textarea id="chat-textarea" name="chat-textarea" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Message the model…" rows="1"></textarea>
    </div>
    <span id="auto-follow-wrap">
      <input id="auto-follow-chk" type="checkbox" checked>
      <label for="auto-follow-chk">Auto-follow</label>
      <button id="resume-btn" style="display:none">▶ Resume</button>
    </span>
  </div>

  <!-- ===== Clear + Settings buttons (fixed, bottom-right) ===== -->
  <button id="settings-btn" title="Generation settings" aria-label="Settings">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
  </button>
  <button id="clear-btn" title="Clear conversation">Clear</button>

  <!-- ===== Settings modal (centered, dimmed backdrop) ===== -->
  <div id="settings-backdrop">
    <div id="settings-popup">
      <h3>Generation settings</h3>
      <div class="field">
        <label for="set-max-tokens">Max output tokens</label>
        <input id="set-max-tokens" type="number" min="1" step="1">
        <div class="hint">How many tokens the model generates per turn. Default = model max context (262144). Larger = slower (one full forward per token).</div>
      </div>
      <div class="field">
        <label for="set-temp">Temperature</label>
        <input id="set-temp" type="number" min="0" step="0.1">
        <div class="hint">0 = greedy (deterministic). Higher = more random sampling.</div>
      </div>
      <div class="field">
        <label for="set-top-n">Readout depth (top-n)</label>
        <input id="set-top-n" type="number" min="1" max="50" step="1">
        <div class="hint">How many top tokens to show per grid cell / detail panel.</div>
      </div>
      <div class="actions">
        <button class="cancel" id="settings-cancel">Cancel</button>
        <button class="ok" id="settings-ok">OK</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
const $ = (id) => document.getElementById(id);

// ----- State -----
let state = {
  modelId: '',
  lensInfo: null,
  messages: [],
  snapshots: [],
  gridRows: [],
  gridTokenStrs: [],
  gridTokenMsgs: [],   // per position: {msgIdx, isGen}
  layers: [],
  selectedSnapshotId: null,
  selectedCell: null,
  selectedToken: null,
  streaming: false,
  streamId: null,       // server stream_id for pause/resume control
  snapshotByMsgToken: new Map(),
  // Generation settings (configurable via the settings popup).
  settings: { maxTokens: 262144, temp: 0.0, topN: 10 },
};

const STORAGE_KEY = 'jlens-conversation-v1';
const SETTINGS_KEY = 'jlens-settings-v1';
const MODEL_MAX_CONTEXT = 262144;  // Qwen3.6-27B max_position_embeddings
let chatDetailClearanceApplied = false;
let detailCloseTimer = null;

function saveState() {
  try {
    // Persist only the serializable parts: messages (role + token text +
    // globalPos), snapshots (the raw server payloads so we can rebuild
    // everything on load), and layers. Maps are rebuilt on load.
    const persistable = {
      messages: state.messages.map(m => ({
        role: m.role,
        content: m.content,
        tokens: m.tokens.map(t => ({ text: t.text, globalPos: t.globalPos })),
        prefillSnapshotId: m.prefillSnapshotId,
      })),
      snapshots: state.snapshots,
      layers: state.layers,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(persistable));
  } catch (e) {
    console.warn('saveState failed (likely quota):', e);
  }
}

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved || !saved.messages || saved.messages.length === 0) return;
    // Rebuild state from the saved conversation.
    state.messages = saved.messages.map(m => ({
      role: m.role,
      content: m.content,
      tokens: (m.tokens || []).map(t => ({
        id: 0, text: t.text, globalPos: t.globalPos, snapshotId: -1,
      })),
      prefillSnapshotId: m.prefillSnapshotId || null,
    }));
    state.snapshots = saved.snapshots || [];
    state.layers = saved.layers || [];
    // Rebuild the snapshotByMsgToken map and grid from snapshots.
    state.snapshotByMsgToken = new Map();
    state.gridRows = [];
    state.gridTokenStrs = [];
    state.gridTokenMsgs = [];
    for (const snap of state.snapshots) {
      state.snapshotByMsgToken.set(`${snap.msg_idx}:${snap.token_idx}`, snap.snapshot_id);
      const m = state.messages[snap.msg_idx];
      if (!m) continue;
      m.role = snap.role;
      if (snap.token_idx === -1) {
        m.prefillSnapshotId = snap.snapshot_id;
        // Rebuild tokens + grid rows from the prefill snapshot.
        if (snap.role === 'user' || (snap.role === 'assistant' && snap.n_tokens > 0)) {
          const strs = snap.token_strs || [];
          if (strs.length) {
            m.tokens = strs.map((str, i) => ({
              id: 0, text: str, globalPos: snap.prefill_pos + i, snapshotId: snap.snapshot_id,
            }));
            m.content = strs.join('');
          }
          strs.forEach((str, i) => {
            const globalPos = snap.prefill_pos + i;
            while (state.gridRows.length <= globalPos) {
              state.gridRows.push(null);
              state.gridTokenStrs.push('');
              state.gridTokenMsgs.push(null);
            }
            state.gridTokenStrs[globalPos] = str;
            state.gridTokenMsgs[globalPos] = { msgIdx: snap.msg_idx, isGen: snap.role === 'assistant' };
            state.snapshotByMsgToken.set(`${snap.msg_idx}:${i}`, snap.snapshot_id);
          });
        }
        if (snap.grid && snap.grid.positions) {
          snap.grid.positions.forEach((pos, i) => writeGridRow(pos, snap.grid.cells, i));
        }
      } else {
        // Token snapshot (assistant generated token).
        const globalPos = snap.pos;
        const tokStr = snap.token;
        while (state.gridRows.length <= globalPos) {
          state.gridRows.push(null);
          state.gridTokenStrs.push('');
          state.gridTokenMsgs.push(null);
        }
        state.gridTokenStrs[globalPos] = tokStr;
        state.gridTokenMsgs[globalPos] = { msgIdx: snap.msg_idx, isGen: true };
        const m2 = state.messages[snap.msg_idx];
        if (m2) {
          while (m2.tokens.length <= snap.token_idx) {
            m2.tokens.push({ id: 0, text: '', globalPos: -1, snapshotId: -1 });
          }
          m2.tokens[snap.token_idx] = {
            id: snap.token_id, text: tokStr, globalPos, snapshotId: snap.snapshot_id,
          };
          m2.content = m2.tokens.map(t => t.text).join('');
        }
        if (snap.grid && snap.grid.positions && snap.grid.positions.length) {
          writeGridRow(globalPos, snap.grid.cells, 0);
        }
      }
    }
  } catch (e) {
    console.warn('loadSavedState failed:', e);
  }
}

function clearState() {
  state.messages = [];
  state.snapshots = [];
  state.gridRows = [];
  state.gridTokenStrs = [];
  state.gridTokenMsgs = [];
  state.layers = [];
  state.selectedSnapshotId = null;
  state.selectedCell = null;
  state.selectedToken = null;
  state.snapshotByMsgToken = new Map();
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

// ----- Settings persistence -----
function loadSettings() {
  try {
    const raw = localStorage.getItem(SETTINGS_KEY);
    if (raw) {
      const s = JSON.parse(raw);
      state.settings.maxTokens = s.maxTokens != null ? s.maxTokens : MODEL_MAX_CONTEXT;
      state.settings.temp = s.temp != null ? s.temp : 0.0;
      state.settings.topN = s.topN != null ? s.topN : 10;
    }
  } catch (e) {}
  syncSettingsInputs();
}

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.settings));
  } catch (e) {}
}

function syncSettingsInputs() {
  $('set-max-tokens').value = state.settings.maxTokens;
  $('set-temp').value = state.settings.temp;
  $('set-top-n').value = state.settings.topN;
}

function readSettingsFromInputs() {
  state.settings.maxTokens = parseInt($('set-max-tokens').value) || MODEL_MAX_CONTEXT;
  state.settings.temp = parseFloat($('set-temp').value) || 0;
  state.settings.topN = parseInt($('set-top-n').value) || 10;
  if (state.settings.maxTokens < 1) state.settings.maxTokens = 1;
  if (state.settings.temp < 0) state.settings.temp = 0;
  if (state.settings.topN < 1) state.settings.topN = 1;

}

// Cache a snapshot of the settings so the modal can restore them on Cancel.

  syncSettingsInputs();
  $('settings-backdrop').classList.add('visible');
  $('set-max-tokens').focus();
}
function closeSettingsModal() { $('settings-backdrop').classList.remove('visible'); }
function commitSettings() { readSettingsFromInputs(); closeSettingsModal(); }
function cancelSettings() {
  if (_cachedSettings) {
    state.settings = { ..._cachedSettings };
    syncSettingsInputs();

  closeSettingsModal();
}

// ----- Overlay-aware scroll padding -----
function bottomStackClearance({ ignoreDetail = false, gapMode = 'detail' } = {}) {
  let blockerTop = window.innerHeight;
  let detailVisible = false;
  let blockerVisible = false;
  ['chat-input', 'detail', 'settings-btn', 'clear-btn'].forEach((id) => {
    if (id === 'detail' && ignoreDetail) return;
    const el = $(id);
    if (!el) return;
    if (id === 'detail' && el.classList.contains('closing')) return;
    const style = getComputedStyle(el);
    if (style.display === 'none' || style.visibility === 'hidden') return;
    if (id === 'detail') detailVisible = true;
    const rect = el.getBoundingClientRect();
    const top = id === 'detail' ? (detailStableRect()?.top ?? rect.top) : rect.top;
    const bottom = id === 'detail' ? (detailStableRect()?.bottom ?? rect.bottom) : rect.bottom;
    const overlapsY = bottom > 0 && top < window.innerHeight;
    if (overlapsY) {
      blockerVisible = true;
      blockerTop = Math.min(blockerTop, top);
    }
  });
  const shouldApplyGap = gapMode === 'always' ? blockerVisible : detailVisible;
  const overlayGap = shouldApplyGap
    ? parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--detail-clearance-gap')) || 0
    : 0;
  return Math.max(0, Math.ceil(window.innerHeight - blockerTop + overlayGap));
}

function updateScrollClearance(opts = {}) {
  const root = document.documentElement;
  const gridClearance = bottomStackClearance({ ...opts, gapMode: 'always' });
  const chatClearance = bottomStackClearance(opts);
  root.style.setProperty('--grid-bottom-clearance', gridClearance + 'px');
  root.style.setProperty('--chat-bottom-clearance', chatClearance + 'px');
}

function gridBottomClearance() {
  const raw = getComputedStyle(document.documentElement).getPropertyValue('--grid-bottom-clearance');
  return parseFloat(raw) || 0;
}

function chatBottomClearance() {
  const raw = getComputedStyle(document.documentElement).getPropertyValue('--chat-bottom-clearance');
  return parseFloat(raw) || 0;
}

function detailClearanceGap() {
  const raw = getComputedStyle(document.documentElement).getPropertyValue('--detail-clearance-gap');
  return parseFloat(raw) || 0;
}

function detailStableRect() {
  const detail = $('detail');
  if (!detail || getComputedStyle(detail).display === 'none') return null;
  const rect = detail.getBoundingClientRect();
  const bottom = parseFloat(getComputedStyle(detail).bottom) || 0;
  const top = window.innerHeight - bottom - rect.height;
  return { top, bottom: top + rect.height, height: rect.height };
}

function resolveChatDetailCollision() {
  const log = $('chat-log');
  const detail = $('detail');
  if (!log || !detail || getComputedStyle(detail).display === 'none') return false;
  const detailRect = detailStableRect();
  if (!detailRect) return false;
  const safeTop = detailRect.top - detailClearanceGap();
  let overlap = 0;
  log.querySelectorAll('.msg .bubble').forEach((bubble) => {
    const rect = bubble.getBoundingClientRect();
    const visibleY = rect.bottom > 0 && rect.top < window.innerHeight;
    const collidesY = rect.bottom > safeTop && rect.top < detailRect.bottom;
    if (visibleY && collidesY) overlap = Math.max(overlap, rect.bottom - safeTop);
  });
  if (overlap <= 0) return false;
  const maxScroll = Math.max(0, log.scrollHeight - log.clientHeight);
  const target = Math.min(maxScroll, log.scrollTop + Math.ceil(overlap));
  if (target <= log.scrollTop) return false;
  log.scrollTo({ top: target, behavior: 'smooth' });
  return true;
}

function selectedChatTokenEl() {
  if (!state.selectedToken) return null;
  return document.querySelector(
    `.msg .tok[data-msg-idx="${state.selectedToken.msgIdx}"][data-token-idx="${state.selectedToken.tokenIdx}"]`
  );
}

function focusRectForInline(el) {
  const rects = Array.from(el.getClientRects()).filter(r => r.width > 0 && r.height > 0);
  if (rects.length === 0) return el.getBoundingClientRect();
  return rects.reduce((best, rect) =>
    rect.width * rect.height > best.width * best.height ? rect : best
  );
}

function clampScrollTarget(scroller, target) {
  const maxScroll = Math.max(0, scroller.scrollHeight - scroller.clientHeight);
  return Math.max(0, Math.min(maxScroll, target));
}

function focusTargetForAvailableArea(scroller, itemRect, bottomClearance) {
  const scrollerRect = scroller.getBoundingClientRect();
  const offset = itemRect.top - scrollerRect.top + scroller.scrollTop;
  const usableHeight = Math.max(itemRect.height, scroller.clientHeight - bottomClearance);
  const target = offset - usableHeight / 2 + itemRect.height / 2;
  return clampScrollTarget(scroller, target);
}

function focusTargetForViewportCenter(scroller, itemRect) {
  const scrollerRect = scroller.getBoundingClientRect();
  const offset = itemRect.top - scrollerRect.top + scroller.scrollTop;
  const viewportCenterInScroller = window.innerHeight / 2 - scrollerRect.top;
  const target = offset - viewportCenterInScroller + itemRect.height / 2;
  return clampScrollTarget(scroller, target);
}

function focusSelectedChatToken() {
  const log = $('chat-log');
  const tok = selectedChatTokenEl();
  if (!log || !tok) return false;
  const tokRect = focusRectForInline(tok);
  const target = focusTargetForAvailableArea(log, tokRect, chatBottomClearance());
  log.scrollTo({ top: target, behavior: 'smooth' });
  return true;
}

function dismissDetailCard() {
  const detail = $('detail');
  if (detailCloseTimer) {
    clearTimeout(detailCloseTimer);
    detailCloseTimer = null;
  }
  if (!detail || (!detail.classList.contains('visible') && getComputedStyle(detail).display === 'none')) {
    return;
  }
  detail.classList.remove('visible');
  detail.classList.add('closing');
  chatDetailClearanceApplied = false;
  document.documentElement.classList.add('recovering-clearance');
  document.documentElement.offsetHeight;
  updateScrollClearance({ ignoreDetail: true });
  detailCloseTimer = setTimeout(() => {
    detail.classList.remove('closing');
    detail.innerHTML = '';
    detailCloseTimer = null;
    document.documentElement.classList.remove('recovering-clearance');
    updateScrollClearance();
  }, 220);
}

function closeDetailCard() {
  state.selectedCell = null;
  state.selectedToken = null;
  dismissDetailCard();
  updateAutoFollowUI();
  renderChat({ scrollToBottom: state.selectedSnapshotId === null });
  renderGrid();
  renderTimeline();
}

// ----- Chat rendering -----
function renderChat({ scrollToBottom = false } = {}) {
  const log = $('chat-log');
  const previousScrollTop = log.scrollTop;
  log.innerHTML = '';
  if (state.messages.length === 0) {
    log.scrollTop = 0;
    return;
  }
  state.messages.forEach((m, mi) => {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + m.role;
    const role = document.createElement('div');
    role.className = 'role';
    role.textContent = m.role === 'user' ? 'You' : 'Assistant';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (m.tokens.length === 0) {
      const ph = document.createElement('span');
      ph.className = 'placeholder';
      ph.textContent = m.role === 'assistant' && state.streaming ? '…' : '…';
      bubble.appendChild(ph);
    } else {
      m.tokens.forEach((t, ti) => {
        const span = document.createElement('span');
        span.className = 'tok';
        span.textContent = t.text;
        span.title = `msg ${mi} tok ${ti} pos ${t.globalPos}`;
        span.dataset.msgIdx = mi;
        span.dataset.tokenIdx = ti;
        if (isSelectedChatToken(mi, ti)) {
          span.classList.add('selected');
        } else if (state.selectedSnapshotId !== null) {
          const snap = state.snapshots.find(s => s.snapshot_id === state.selectedSnapshotId);
          if (snap && snap.msg_idx === mi && snap.token_idx === ti) {
            span.classList.add('selected');
          }
        }
        if (state.streaming && mi === state.messages.length - 1 && ti === m.tokens.length - 1 && m.role === 'assistant') {
          span.classList.add('frontier');
        }
        span.onclick = () => selectTokenInChat(mi, ti);
        bubble.appendChild(span);
      });
    }
    wrap.appendChild(role);
    wrap.appendChild(bubble);
    log.appendChild(wrap);
  });
  log.scrollTop = scrollToBottom ? log.scrollHeight : previousScrollTop;
}

// ----- Grid rendering -----
function visiblePositionsForSnapshot(snapId) {
  if (snapId === null) return state.gridRows.length;
  const snap = state.snapshots.find(s => s.snapshot_id === snapId);
  if (!snap) return state.gridRows.length;
  if (snap.token_idx === -1) {
    return (snap.prefill_pos != null ? snap.prefill_pos : -1) + 1;
  } else {
    return (snap.pos != null ? snap.pos : -1) + 1;
  }
}

function cellIntensity(cell) {
  // Soft heatmap color based on the top-1 score relative to the rest.
  if (!cell || !cell.top_scores || cell.top_scores.length < 2) return null;
  const s0 = cell.top_scores[0] || 0;
  const s1 = cell.top_scores[1] || 0;
  const gap = s0 - s1;
  // Larger gap => more confident => stronger tint.
  const t = Math.max(0, Math.min(1, gap / 8));
  return t;
}

function cellBlueBackground(cell) {
  const t = cellIntensity(cell);
  const alpha = t == null ? 0.10 : 0.10 + t * 0.22;
  return `rgba(36,135,222,${alpha.toFixed(3)})`;
}

function normalizeTokenText(s) {
  const text = (s || '').trim();
  if (!text || text === '·') return '';
  return text.toLocaleLowerCase();
}

function selectedCellTokenKey() {
  if (!state.selectedCell) return '';
  const { pos, layer } = state.selectedCell;
  const cell = state.gridRows[pos] && state.gridRows[pos][layer];
  return normalizeTokenText(cell && cell.top_tokens && cell.top_tokens[0]);
}

function selectedPosition() {
  if (state.selectedToken && state.selectedToken.pos >= 0) return state.selectedToken.pos;
  if (state.selectedCell) return state.selectedCell.pos;
  return null;
}

function tokenRefForPosition(pos) {
  const meta = state.gridTokenMsgs[pos];
  if (!meta) return null;
  const msg = state.messages[meta.msgIdx];
  if (!msg) return null;
  const tokenIdx = msg.tokens.findIndex(t => t.globalPos === pos);
  if (tokenIdx < 0) return null;
  return { msgIdx: meta.msgIdx, tokenIdx, pos };
}

function defaultLayerForPosition(pos) {
  if (state.selectedCell && state.selectedCell.pos === pos && state.gridRows[pos]?.[state.selectedCell.layer]) {
    return state.selectedCell.layer;
  }
  return state.layers.find(layer => state.gridRows[pos]?.[layer] != null);
}

function isSelectedChatToken(msgIdx, tokenIdx) {
  return !!state.selectedToken &&
    state.selectedToken.msgIdx === msgIdx &&
    state.selectedToken.tokenIdx === tokenIdx;
}

function updateGridHeaderShadows() {
  const body = $('grid-body');
  if (!body) return;
  const maxScrollTop = Math.max(0, body.scrollHeight - body.clientHeight);
  const maxScrollLeft = Math.max(0, body.scrollWidth - body.clientWidth);
  body.classList.toggle('scrolled-y', maxScrollTop > 1 && body.scrollTop > 1);
  body.classList.toggle('covering-x', maxScrollLeft > 1 && body.scrollLeft < maxScrollLeft - 1);
}

function renderGrid() {
  const body = $('grid-body');
  if (state.gridRows.length === 0 || state.layers.length === 0) {
    body.innerHTML = '';
    body.classList.remove('scrolled-y', 'covering-x');
    return;
  }
  const visibleN = visiblePositionsForSnapshot(state.selectedSnapshotId);
  const table = document.createElement('table');
  table.id = 'grid';

  // Header row: layer labels (sticky top). The position label column is on the right.
  const thead = document.createElement('thead');
  const hrow = document.createElement('tr');
  state.layers.forEach(l => {
    const th = document.createElement('th');
    th.textContent = 'L' + l;
    hrow.appendChild(th);
  });
  const posHeader = document.createElement('th');
  posHeader.className = 'pos-header';
  posHeader.textContent = 'token';
  hrow.appendChild(posHeader);
  thead.appendChild(hrow);
  table.appendChild(thead);

  const selectedTokenKey = selectedCellTokenKey();
  const activePos = selectedPosition();
  const tbody = document.createElement('tbody');
  for (let pos = 0; pos < visibleN; pos++) {
    const tr = document.createElement('tr');
    const tokStr = state.gridTokenStrs[pos] || '·';
    const meta = state.gridTokenMsgs[pos];
    const isGen = meta && meta.isGen;
    // Data cells: one per layer
    state.layers.forEach(layer => {
      const td = document.createElement('td');
      td.className = 'cell';
      const cell = state.gridRows[pos] && state.gridRows[pos][layer];
      if (cell) {
        const top1 = cell.top_tokens[0] || '·';
        const word = document.createElement('span');
        word.className = 'word';
        word.textContent = top1;
        td.appendChild(word);
        td.classList.add('selectable');
        td.style.background = cellBlueBackground(cell);
        td.dataset.pos = pos;
        td.dataset.layer = layer;
        if (state.selectedCell && state.selectedCell.pos === pos && state.selectedCell.layer === layer) {
          td.classList.add('selected');
        } else if (selectedTokenKey && normalizeTokenText(top1) === selectedTokenKey) {
          td.classList.add('matching-token');
        }
        if (state.selectedCell && state.selectedCell.pos === pos) {
          td.classList.add('selected-row');
        }
        if (isGen) td.classList.add('gen-row');
        td.onclick = () => selectCell(pos, layer);
      } else {
        td.textContent = '';
      }
      tr.appendChild(td);
    });
    // Right: position label (sticky right) — token text + ordinal, right-aligned
    const pl = document.createElement('td');
    pl.className = 'pos-label';
    if (isGen) pl.classList.add('gen');
    if (activePos === pos) pl.classList.add('selected-token');
    pl.innerHTML = `<span class="tok-text">${escapeHtml(tokStr)}</span>`;
    pl.title = `position ${pos}: ${JSON.stringify(tokStr)}`;
    if (normalizeTokenText(tokStr) && tokenRefForPosition(pos)) {
      pl.classList.add('clickable-token');
      pl.onclick = () => selectTokenHeader(pos);
    }
    tr.appendChild(pl);
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  body.innerHTML = '';
  body.appendChild(table);
  updateGridHeaderShadows();
  if (state.selectedCell || activePos !== null) {
    // Center the selected cell, or the token header when no layer cell is selected.
    // Use requestAnimationFrame so the DOM has settled after innerHTML reset.
    requestAnimationFrame(() => {
      const sel = body.querySelector('td.cell.selected') || body.querySelector('td.pos-label.selected-token');
      if (sel) {
        const targetRect = sel.getBoundingClientRect();
        const target = focusTargetForViewportCenter(body, targetRect);
        body.scrollTo({ top: target, behavior: 'smooth' });
        requestAnimationFrame(updateGridHeaderShadows);
      }
    });
  } else if (state.selectedSnapshotId === null) {
    body.scrollTop = body.scrollHeight;
    updateGridHeaderShadows();
  }
}

function renderDetail() {
  const col = $('detail');
  if (!state.selectedCell) {
    if (col.classList.contains('closing')) return;
    col.classList.remove('visible');
    col.innerHTML = '';
    return;
  }
  if (detailCloseTimer) {
    clearTimeout(detailCloseTimer);
    detailCloseTimer = null;
  }
  document.documentElement.classList.remove('recovering-clearance');
  col.classList.remove('closing');
  const { pos, layer } = state.selectedCell;
  const tokStr = state.gridTokenStrs[pos] || '·';
  col.innerHTML = '';
  // Close button
  const close = document.createElement('button');
  close.className = 'close';
  close.innerHTML = '&times;';
  close.title = 'Close detail';
  close.onclick = () => closeDetailCard();
  col.appendChild(close);
  const h3 = document.createElement('h3');
  h3.textContent = 'Detail';
  col.appendChild(h3);
  const ctx = document.createElement('div');
  ctx.className = 'ctx';
  ctx.innerHTML = `position <b>${pos}</b> · token <b>${escapeHtml(tokStr)}</b> · layer <b>L${layer}</b>`;
  col.appendChild(ctx);
  const cell = state.gridRows[pos] && state.gridRows[pos][layer];
  if (!cell) {
    col.appendChild(document.createTextNode('No readout at this position.'));
    col.classList.add('visible');
    return;
  }
  // Find max score for bar normalization
  const maxScore = Math.max(...cell.top_scores, 1);
  const readout = document.createElement('div');
  readout.className = 'readout';
  cell.top_tokens.forEach((tok, i) => {
    const row = document.createElement('div');
    row.className = 'row' + (i === 0 ? ' top1' : '');
    const idx = document.createElement('span'); idx.className = 'idx'; idx.textContent = (i+1);
    const t = document.createElement('span'); t.className = 'tok'; t.textContent = tok;
    const id = document.createElement('span'); id.className = 'id'; id.textContent = `(${cell.top_ids[i]})`;
    const bar = document.createElement('span'); bar.className = 'bar';
    const fill = document.createElement('div');
    fill.style.width = (cell.top_scores[i] / maxScore * 100) + '%';
    bar.appendChild(fill);
    row.appendChild(idx); row.appendChild(t); row.appendChild(id); row.appendChild(bar);
    readout.appendChild(row);
  });
  col.appendChild(readout);
  col.classList.add('visible');
}

// ----- Timeline rendering -----
// Timeline removed — the J-lens grid IS the timeline now.
function renderTimeline() {}

function isBlockSelected(msgIdx, tokenIdx) {
  if (state.selectedSnapshotId === null) return false;
  const snap = state.snapshots.find(s => s.snapshot_id === state.selectedSnapshotId);
  return snap && snap.msg_idx === msgIdx && snap.token_idx === tokenIdx;
}

function isFrontier(msgIdx, tokenIdx) {
  if (!state.streaming) return false;
  const m = state.messages[msgIdx];
  if (!m) return false;
  if (m.role === 'user') return tokenIdx === -1;
  if (m.role === 'assistant') {
    if (m.tokens.length === 0) return tokenIdx === -1;
    return tokenIdx === m.tokens.length - 1;
  }
  return false;
}

// ----- Selection logic -----
function selectBlock(msgIdx, tokenIdx) {
  const token = state.messages[msgIdx]?.tokens[tokenIdx];
  if (!token) return;
  state.selectedToken = { msgIdx, tokenIdx, pos: token.globalPos };
  const layer = token.globalPos >= 0 ? defaultLayerForPosition(token.globalPos) : null;
  state.selectedCell = layer == null ? null : { pos: token.globalPos, layer };
  state.selectedSnapshotId = -1; // pinned inspection mode
  updateAutoFollowUI();
  sendControl('pause');
  renderAll();
}
function selectTokenInChat(msgIdx, tokenIdx) {
  const token = state.messages[msgIdx]?.tokens[tokenIdx];
  if (!token) return;
  const hadCellSelection = !!state.selectedCell;
  state.selectedToken = { msgIdx, tokenIdx, pos: token.globalPos };
  state.selectedCell = null;
  state.selectedSnapshotId = -1; // pinned inspection mode without selecting a J-lens block
  if (hadCellSelection) dismissDetailCard();
  updateAutoFollowUI();
  sendControl('pause');
  renderAll();
}
function selectTokenHeader(pos) {
  const ref = tokenRefForPosition(pos);
  if (!ref) return;
  const hadCellSelection = !!state.selectedCell;
  state.selectedToken = ref;
  state.selectedCell = null;
  state.selectedSnapshotId = -1; // pinned token focus without selecting a J-lens block
  if (hadCellSelection) dismissDetailCard();
  updateAutoFollowUI();
  sendControl('pause');
  renderAll();
}
function selectCell(pos, layer) {
  state.selectedCell = { pos, layer };
  state.selectedToken = tokenRefForPosition(pos);
  state.selectedSnapshotId = -1; // mark as pinned (not null = not auto-following)
  updateAutoFollowUI();
  sendControl('pause');
  renderAll();
}
function updateAutoFollowUI() {
  const resumeBtn = $('resume-btn');
  const chk = $('auto-follow-chk');
  if (state.selectedSnapshotId === null) {
    resumeBtn.style.display = 'none';
    chk.checked = true;
  } else {
    // Show the resume button whenever the view is pinned away from the
    // frontier, regardless of whether we're currently streaming. Previously
    // it was gated on `state.streaming`, which made it disappear when
    // generation finished while you were inspecting an earlier snapshot —
    // leaving you stuck with no visible way to resume.
    resumeBtn.style.display = '';
    chk.checked = false;
  }
}
function renderAll() {
  const shouldResolveChatDetailCollision = !!state.selectedCell && !chatDetailClearanceApplied;
  renderDetail();
  updateScrollClearance();
  renderChat({ scrollToBottom: state.selectedSnapshotId === null });
  if (state.selectedToken) {
    requestAnimationFrame(() => {
      focusSelectedChatToken();
    });
  } else if (shouldResolveChatDetailCollision) {
    requestAnimationFrame(() => resolveChatDetailCollision());
  }
  chatDetailClearanceApplied = !!state.selectedCell;
  renderGrid();
  renderTimeline();
}

// ----- Ingest a snapshot -----
function ingestSnapshot(snap) {
  state.snapshots.push(snap);
  state.snapshotByMsgToken.set(`${snap.msg_idx}:${snap.token_idx}`, snap.snapshot_id);
  while (state.messages.length <= snap.msg_idx) {
    state.messages.push({ role: '?', content: '', tokens: [], prefillSnapshotId: null });
  }
  const m = state.messages[snap.msg_idx];
  m.role = snap.role;

  if (snap.token_idx === -1) {
    m.prefillSnapshotId = snap.snapshot_id;
    if (snap.role === 'user') {
      // Populate user tokens so the bubble renders the message, and
      // register each user-token index → prefill snapshot so per-token
      // blocks in the timeline can drive selection.
      const strs = snap.token_strs || [];
      m.content = strs.join('');
      m.tokens = strs.map((str, i) => ({
        id: 0, text: str, globalPos: snap.prefill_pos + i, snapshotId: snap.snapshot_id,
      }));
      strs.forEach((str, i) => {
        const globalPos = snap.prefill_pos + i;
        ensureGridRow(globalPos, str, { msgIdx: snap.msg_idx, isGen: false });
        state.snapshotByMsgToken.set(`${snap.msg_idx}:${i}`, snap.snapshot_id);
      });
    } else if (snap.role === 'assistant' && snap.n_tokens > 0) {
      // Historical assistant message (multi-turn context): the server sent
      // all of its tokens in one prefill snapshot. Populate m.tokens so the
      // bubble + timeline render them, without re-generation.
      const strs = snap.token_strs || [];
      m.content = strs.join('');
      m.tokens = strs.map((str, i) => ({
        id: 0, text: str, globalPos: snap.prefill_pos + i, snapshotId: snap.snapshot_id,
      }));
      strs.forEach((str, i) => {
        const globalPos = snap.prefill_pos + i;
        ensureGridRow(globalPos, str, { msgIdx: snap.msg_idx, isGen: true });
        state.snapshotByMsgToken.set(`${snap.msg_idx}:${i}`, snap.snapshot_id);
      });
    }
    // Write grid rows for all positions the server sent readouts at.
    if (snap.grid && snap.grid.positions) {
      snap.grid.positions.forEach((pos, i) => writeGridRow(pos, snap.grid.cells, i));
    }
  } else {
    const globalPos = snap.pos;
    const tokStr = snap.token;
    ensureGridRow(globalPos, tokStr, { msgIdx: snap.msg_idx, isGen: true });
    while (m.tokens.length <= snap.token_idx) {
      m.tokens.push({ id: 0, text: '', globalPos: -1, snapshotId: -1 });
    }
    m.tokens[snap.token_idx] = {
      id: snap.token_id, text: tokStr, globalPos, snapshotId: snap.snapshot_id,
    };
    m.content = m.tokens.map(t => t.text).join('');
    if (snap.grid && snap.grid.positions && snap.grid.positions.length) {
      writeGridRow(globalPos, snap.grid.cells, 0);
    }
  }
  saveState();
  renderAll();
}

function ensureGridRow(globalPos, tokStr, meta) {
  while (state.gridRows.length <= globalPos) {
    state.gridRows.push(null);
    state.gridTokenStrs.push('');
    state.gridTokenMsgs.push(null);
  }
  state.gridTokenStrs[globalPos] = tokStr;
  if (meta) state.gridTokenMsgs[globalPos] = meta;
}

function writeGridRow(pos, cells, sliceIndex) {
  if (!cells) return;
  if (!state.gridRows[pos]) state.gridRows[pos] = {};
  for (const layer of Object.keys(cells)) {
    const c = cells[layer];
    state.gridRows[pos][parseInt(layer)] = {
      top_ids: c.top_ids[sliceIndex],
      top_tokens: c.top_tokens[sliceIndex],
      top_scores: c.top_scores[sliceIndex],
    };
  }
  if (state.layers.length === 0) {
    state.layers = Object.keys(cells).map(l => parseInt(l)).sort((a, b) => a - b);
  }
}

// ----- Streaming request -----
async function sendMessage() {
  const ta = $('chat-textarea');
  const content = ta.value.trim();
  if (!content || state.streaming) return;

  state.messages.push({ role: 'user', content, tokens: [], prefillSnapshotId: null });
  state.messages.push({ role: 'assistant', content: '', tokens: [], prefillSnapshotId: null });
  state.streaming = true;
  state.selectedSnapshotId = null;
  updateAutoFollowUI();
  renderAll();

  const payload = {
    messages: state.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content })),
    max_tokens: state.settings.maxTokens,
    temp: state.settings.temp,
    top_n: state.settings.topN,
  };
  ta.value = '';
  ta.style.height = 'auto';

  try {
    const resp = await fetch(API + '/api/chat_stream', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!resp.ok) {
      const txt = await resp.text();
      console.error('stream error:', txt.slice(0,200));
      state.streaming = false;
      updateAutoFollowUI();
      renderAll();
      return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buffer.indexOf('\n\n')) !== -1) {
        const frame = buffer.slice(0, idx);
        buffer = buffer.slice(idx + 2);
        handleSSEFrame(frame);
      }
    }
    if (buffer.trim()) handleSSEFrame(buffer);
  } catch (e) {
    console.error('request failed:', e);
  } finally {
    state.streaming = false;
    state.streamId = null;
    updateAutoFollowUI();
    renderAll();
  }
}

function handleSSEFrame(frame) {
  const lines = frame.split('\n');
  let event = 'message';
  let data = '';
  for (const line of lines) {
    if (line.startsWith('event: ')) event = line.slice(7).trim();
    else if (line.startsWith('data: ')) data += line.slice(6);
  }
  if (!data) return;
  let obj;
  try { obj = JSON.parse(data); } catch (e) { return; }
  if (event === 'stream_start') {
    state.streamId = obj.stream_id;
  } else if (event === 'snapshot') {
    ingestSnapshot(obj);
  } else if (event === 'done') {
    console.log('done ·', obj.n_tokens, 'tokens');
  } else if (event === 'error') {
    console.error('stream error', obj);
  }
}

// ----- Server-side pause/resume control -----
async function sendControl(action) {
  if (!state.streamId) return;
  try {
    await fetch(API + '/api/chat_control', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stream_id: state.streamId, action }),
    });
  } catch (e) { console.warn('chat_control failed:', e); }
}

// ----- Resume control -----
$('resume-btn').onclick = () => {
  state.selectedSnapshotId = null;
  state.selectedCell = null;
  state.selectedToken = null;
  updateAutoFollowUI();
  sendControl('resume');
  renderAll();
};
$('auto-follow-chk').onchange = () => {
  if ($('auto-follow-chk').checked) {
    state.selectedSnapshotId = null;
    state.selectedCell = null;
    state.selectedToken = null;
    sendControl('resume');
  } else if (state.snapshots.length) {
    state.selectedSnapshotId = state.snapshots[state.snapshots.length - 1].snapshot_id;
    sendControl('pause');
  }
  updateAutoFollowUI();
  renderAll();
};

// ----- Textarea auto-grow + Enter to send -----
$('chat-textarea').addEventListener('input', () => {
  const ta = $('chat-textarea');
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  updateScrollClearance();
});
window.addEventListener('resize', () => {
  updateScrollClearance();
  updateGridHeaderShadows();
  if (state.selectedCell) renderGrid();
});
$('grid-body').addEventListener('scroll', updateGridHeaderShadows, { passive: true });
$('chat-textarea').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ----- Clear conversation -----
$('clear-btn').onclick = () => {
  if (state.streaming) return;  // don't clear mid-stream
  if (state.messages.length === 0) return;
  if (!confirm('Clear the conversation? This cannot be undone.')) return;
  clearState();
  renderAll();
};

// ----- Settings modal -----
$('settings-btn').onclick = () => openSettingsModal();
$('settings-ok').onclick = commitSettings;
$('settings-cancel').onclick = cancelSettings;
// Click on the dimming backdrop (outside the dialog) cancels.
$('settings-backdrop').addEventListener('click', (e) => {
  if (e.target === $('settings-backdrop')) cancelSettings();
});
// Enter inside a field commits; Escape cancels.
['set-max-tokens', 'set-temp', 'set-top-n'].forEach((id) => {
  $(id).addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); commitSettings(); }
    if (e.key === 'Escape') { e.preventDefault(); cancelSettings(); }
  });
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && $('settings-backdrop').classList.contains('visible')) cancelSettings();
});

function escapeHtml(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

loadInfo();
loadSettings();
loadSavedState();
renderAll();
</script>
</body></html>
